{% extends "base.html" %}

{% block title %}Create League - Gaming Tournament & League{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Create New League</h2>
    <form method="POST">
        <div class="form-group">
            <label for="name">League Name</label>
            <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
            <label for="game_id">Game</label>
            <select id="game_id" name="game_id" required>
                <option value="">Select a game</option>
                {% for game in games %}
                    <option value="{{ game.id }}">{{ game.name }} ({{ game.platform }})</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label>Select Players (minimum 2)</label>
            <div class="players-grid">
                {% for player in players %}
                    <label class="player-checkbox">
                        <input type="checkbox" name="players" value="{{ player.id }}">
                        {{ player.name }}
                    </label>
                {% endfor %}
            </div>
        </div>
        <button type="submit" class="btn-primary">Create League</button>
        <a href="/leagues" class="btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
