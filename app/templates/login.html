{% extends "base.html" %}

{% block title %}Login - Gaming Tournament & League{% endblock %}

{% block content %}
<div class="form-container">
    <h2>Login</h2>
    <form method="POST">
        <div class="form-group">
            <label for="email">Email or Username</label>
            <input type="text" id="email" name="email" required placeholder="Enter email or username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit" class="btn-primary">Login</button>
    </form>
    <p class="demo-info">Don't have an account? <a href="/register">Register here</a></p>
</div>
{% endblock %}
